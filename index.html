<!DOCTYPE html>
<html>
<head>
  <title>Flagler Navigation Menu</title>
  <!-- These tags tell Canva what the page is -->
  <meta property="og:title" content="Interactive Widget" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://vlendering137.github.io/Flaglermain-header/" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="frame-ancestors 'self' https://*.canva.com;">

  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

    :root {
      --nav-bg: #000000;
      --nav-text: #ffffff;
      --nav-border: #a3002b;
      --button-bg: #a3002b;
      --button-text: #ffffff;
      --hover-underline: #ffffff;
      --nav-height: 58px;
      --font-main: Arial, Helvetica, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    .navbar {
      width: 100%;
      background: var(--nav-bg);
      border-bottom: 4px solid var(--nav-border);
      color: var(--nav-text);
      position: relative;
      z-index: 1000;
    }

    .nav-inner {
      min-height: var(--nav-height);
      max-height: var(--nav-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 40px;
      gap: 28px;
    }

    .logo img {
      display: block;
      max-height: 30px;
      width: auto;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .menu {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .menu a {
      color: var(--nav-text);
      text-decoration: none;
      font-size: 16px;
      font-weight: 700;
      position: relative;
      padding: 4px 0;
      white-space: nowrap;
    }

    .menu a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -3px;
      width: 0;
      height: 2px;
      background: var(--hover-underline);
      transition: width 0.2s ease;
    }

    .menu a:hover::after {
      width: 100%;
    }

    .flagler-btn {
      background: var(--button-bg);
      color: var(--button-text);
      text-decoration: none;
      font-size: 15px;
      font-weight: 800;
      padding: 12px 18px;
      border-radius: 8px;
      white-space: nowrap;
    }

    .mobile-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--nav-text);
      font-size: 28px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
    }

    .mobile-overlay {
      display: none;
    }

    @media (max-width: 768px) {
      .nav-inner {
        padding: 0 18px;
        gap: 14px;
      }

      .desktop-menu {
        display: none;
      }

      .mobile-toggle {
        display: block;
      }

      .nav-right {
        gap: 16px;
        margin-left: auto;
      }

      .flagler-btn {
        padding: 10px 14px;
        font-size: 13px;
      }

      .mobile-overlay {
        position: fixed;
        inset: 0;
        background: var(--nav-bg);
        color: var(--nav-text);
        z-index: 900;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.25s ease;
      }

      .mobile-overlay.open {
        opacity: 1;
        pointer-events: auto;
      }

      .mobile-overlay a {
        color: var(--nav-text);
        text-decoration: none;
        font-size: 28px;
        font-weight: 800;
        position: relative;
      }

      .mobile-overlay a::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -6px;
        width: 0;
        height: 2px;
        background: var(--hover-underline);
        transition: width 0.2s ease;
      }

      .mobile-overlay a:hover::after {
        width: 100%;
      }
    }

    @media (max-width: 420px) {
      .logo img {
        max-height: 24px;
      }

      .flagler-btn {
        font-size: 12px;
        padding: 9px 10px;
      }

      .nav-inner {
        padding: 0 12px;
      }
    }
  </style>
</head>

<body>

  <header class="navbar">
    <div class="nav-inner">

      <a class="logo" id="logoLink" href="#">
        <img id="logoImg" src="" alt="Flagler College Logo">
      </a>

      <div class="nav-right">
        <nav class="menu desktop-menu" id="desktopMenu"></nav>

        <a class="flagler-btn" id="mainButton" href="#">
          FLAGLER.EDU »
        </a>

        <button class="mobile-toggle" id="mobileToggle" aria-label="Open menu">
          ☰
        </button>
      </div>

    </div>
  </header>

  <nav class="mobile-overlay" id="mobileOverlay"></nav>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      /* =========================
         EASY EDIT SECTION
         ========================= */

      const logoUrl = "https://uc8940ab5a86dbebc8712957fb23.previews.dropboxusercontent.com/p/thumb/ADDbAkrfirm49rU33HmE55oYNVF5aYSQbSkuT-VfXYMPMhFDLMReXnGb0FeFd4SNcHjehxDHvW1abCRmrzK8OiYdgyhJnmr3w0LfZ_u40aLTiASFhXrjhgfPdHCo5FWYGx5Astkk8PBE7T4_e0lZOVMJi-LYPx4BerHKDFmIMaeyfv0_Oi9ZR8osiU8a3LfTaa-p286_8zaa7Y3JjQdN71pEkw-pMA1-1cLBnhXnIQI9yw-S1nutUayxCtjoJnSO0Y_9yOzUxy8IzBb7E1vd1psFcHfvQGKosaqmSha-FGXfw_1aOIDTh1egrT0GvCXpk_g5xUnApxsLCgZGqevSt7AtIOWv8StnqsFxEK201op339RrNpwrAhGzbjHcULTN9-Y/p.png?is_prewarmed=true";

      const logoLink = "https://www.flagler.edu";

      const menuItems = [
        { label: "Visit", url: "https://www.flagler.edu/admissions-aid/visit" },
        { label: "Apply", url: "https://www.flagler.edu/apply" },
        { label: "Academics", url: "https://www.flagler.edu/academics" },
        { label: "About", url: "https://www.flagler.edu/about" },
        { label: "Athletics", url: "https://flaglerathletics.com" }
      ];

      const mainButton = {
        label: "FLAGLER.EDU »",
        url: "https://www.flagler.edu"
      };

      /* =========================
         BUILD NAV
         ========================= */

      const desktopMenu = document.getElementById("desktopMenu");
      const mobileOverlay = document.getElementById("mobileOverlay");
      const mobileToggle = document.getElementById("mobileToggle");

      document.getElementById("logoImg").src = logoUrl;
      document.getElementById("logoLink").href = logoLink;

      const button = document.getElementById("mainButton");
      button.textContent = mainButton.label;
      button.href = mainButton.url;
      button.target = "_blank";
      button.rel = "noopener noreferrer";

      menuItems.forEach(item => {
        const desktopLink = document.createElement("a");
        desktopLink.href = item.url;
        desktopLink.textContent = item.label;
        desktopLink.target = "_blank";
        desktopLink.rel = "noopener noreferrer";
        desktopMenu.appendChild(desktopLink);

        const mobileLink = document.createElement("a");
        mobileLink.href = item.url;
        mobileLink.textContent = item.label;
        mobileLink.target = "_blank";
        mobileLink.rel = "noopener noreferrer";
        mobileOverlay.appendChild(mobileLink);
      });

      mobileToggle.addEventListener("click", () => {
        mobileOverlay.classList.toggle("open");
        mobileToggle.textContent = mobileOverlay.classList.contains("open") ? "×" : "☰";
      });
    });
  </script>

</body>
</html>
